services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    container_name: mavan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mavan-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # override host-only values for docker network
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: mavan
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_RELOAD: "0"
      FILESYSTEM_PATH: /app/data/notes
      RAG_VECTOR_INDEX_PATH: /app/.rag/vector_index
      CHAT_PROVIDER: gemini          # для demo без ключей
      EMBED_PROVIDER: mock
    volumes:
      - ./data/notes:/app/data/notes:ro
      - rag_index:/app/.rag
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Optional UI — раскомментировать если нужен screenshot для capstone
  # flask:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.flask
